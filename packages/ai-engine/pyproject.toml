[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "akoka-solve-ai-engine"
version = "0.1.0"
description = "AI Psychometric Engine for Akoka Solve"
authors = [
    { name = "Akoka Solve Team", email = "team@akokasolve.com" }
]
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "scikit-learn",
    "numpy",
    "pandas",
    "python-jose[cryptography]",
    "httpx",
    "redis",
    "confluent-kafka",
    "python-dotenv"
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
