apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: akoka-solve-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/limit-rps: "100" # Rate limiting for DDOS protection
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Automated SSL via Let's Encrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.akokasolve.com
      secretName: api-akokasolve-com-tls
  rules:
    - host: api.akokasolve.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 80
